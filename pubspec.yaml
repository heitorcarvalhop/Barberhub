name: barber_hub
description: Barber Hub - App de barbearia moderno

publish_to: 'none'

version: 2.4.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1
  flutter_lucide: ^1.11.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.0
  supabase_flutter: ^2.14.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
